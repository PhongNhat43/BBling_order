<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quản lý Menu | B.BLING</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#3E2723', cream: '#F2E8DF', accent: '#C2410C', success: '#16A34A', darkbg: '#1F2937' },
          fontFamily: { serif: ['Playfair Display','serif'], sans: ['Montserrat','sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-darkbg text-gray-100 font-sans">
  <header class="px-4 py-4 border-b border-white/10">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="font-serif italic text-2xl">B.BLING</div>
        <span class="text-xs uppercase tracking-[0.2em] text-gray-400">Menu Management</span>
      </div>
      <nav class="text-xs flex items-center gap-4">
        <a href="admin-dashboard.html" class="text-gray-300 hover:text-white underline underline-offset-4">Dashboard</a>
        <a href="index.html" class="text-gray-300 hover:text-white underline underline-offset-4">Trang khách</a>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-6">
    <div class="flex items-center justify-between mb-4">
      <div class="font-semibold">Danh sách món</div>
      <button id="add-item" class="px-4 py-2 rounded-lg bg-accent text-white">+ Thêm món mới</button>
    </div>
    <div class="overflow-x-auto rounded-xl border border-white/10">
      <table class="min-w-full text-sm">
        <thead class="bg-gray-800 text-gray-300">
          <tr>
            <th class="text-left px-3 py-3">Danh mục</th>
            <th class="text-left px-3 py-3">Tên món</th>
            <th class="text-right px-3 py-3">Giá (k)</th>
            <th class="text-right px-3 py-3">Giá (VND)</th>
            <th class="text-center px-3 py-3">Hiển thị</th>
            <th class="text-right px-3 py-3">Hành động</th>
          </tr>
        </thead>
        <tbody id="table-body" class="divide-y divide-white/10 bg-gray-900"></tbody>
      </table>
    </div>
  </main>

  <script src="menu-store.js" defer></script>
  <script>
    let menuData = getMenuForAdmin();
    let categories = menuData.categories;
    let items = menuData.items;

    function vnd(k){ return (k*1000).toLocaleString('vi-VN') + ' đ' }
    function catName(catId){ return categories.find(c=>c.id===catId)?.name || catId }

    function render(){
      const tb = document.getElementById('table-body')
      tb.innerHTML = items.map((m,i)=>`
        <tr>
          <td class="px-3 py-2">${catName(m.cat)}</td>
          <td class="px-3 py-2">${m.name}</td>
          <td class="px-3 py-2 text-right">${m.priceK}</td>
          <td class="px-3 py-2 text-right">${vnd(m.priceK)}</td>
          <td class="px-3 py-2 text-center">
            <span class="inline-block px-2 py-1 rounded-lg text-xs ${m.visible!==false?'bg-green-600':'bg-gray-600'}">${m.visible!==false?'Hiện':'Ẩn'}</span>
          </td>
          <td class="px-3 py-2 text-right">
            <button data-i="${i}" class="toggle px-3 py-1 rounded-lg border border-white/20 mr-2">${m.visible!==false?'Ẩn':'Hiện'}</button>
            <button data-i="${i}" class="edit px-3 py-1 rounded-lg bg-primary text-cream">Sửa giá</button>
          </td>
        </tr>
      `).join('')
      tb.querySelectorAll('.toggle').forEach(b=>b.addEventListener('click',()=>{
        const i = Number(b.dataset.i); items[i].visible = !items[i].visible; saveMenu(categories, items); render()
      }))
      tb.querySelectorAll('.edit').forEach(b=>b.addEventListener('click',()=>{
        const i = Number(b.dataset.i); const cur = items[i].priceK
        const nv = prompt('Nhập giá theo đơn vị k', String(cur))
        const num = Number(nv)
        if(!isNaN(num) && num>0){ items[i].priceK = Math.round(num); saveMenu(categories, items); render() }
      }))
    }

    document.getElementById('add-item').addEventListener('click', ()=>{
      const name = prompt('Tên món mới'); if(!name) return
      const catList = categories.map(c=>c.name).join(', ')
      const catNameInput = prompt('Danh mục (chọn một trong: ' + catList + ')', categories[0]?.name || '')
      const cat = categories.find(c=>c.name===catNameInput) || categories[0]
      const p = Number(prompt('Giá (k)', '30') || '30')
      const newId = 'it-' + Date.now()
      items.push({ id: newId, name, priceK: isNaN(p)?30:Math.round(p), desc: '', img: '', cat: cat?.id||'', visible: true })
      saveMenu(categories, items)
      render()
    })
    render()
  </script>
</body>
</html>
